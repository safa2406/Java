<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer</title>
</head>
<body>
    <h1>Click on the start button to change the background color</h1>
    <button id="start">Start</button>
    <button id="stop">Stop</button>
</body>
<script>
    const randomColor = function(){
        const hex = '0123456789ABCDEF';
        let color = '#';
        for(i=0;i<6;i++){
         color += hex[Math.floor(Math.random() * 16)];
        }
        return color;
    };
    let interval;

    const changeBg = function(){
            document.body.style.backgroundColor = randomColor();
        };


    const startBgChange = function(){
        if(!interval){
         interval = setInterval(changeBg,1000)
        }};

    const stopBgChange = function(){
        clearInterval(interval)
            interval = null;
        };
        
    
    document.querySelector('#start').addEventListener('click',startBgChange);
    document.querySelector('#stop').addEventListener('click',stopBgChange);

    
</script>
</html>
